<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" role="img" aria-label="Priyanshu Mohan — Frontend Engineer. Building interactive digital experiences through motion, animation and clean engineering.">
  <defs>
    <style>
      .name { font-family: 'Cabinet Grotesk', 'General Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 800; }
      .role { font-family: 'General Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 600; }
      .tagline { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-weight: 400; }
    </style>
  </defs>

  <rect width="1200" height="300" fill="#0D1117" />

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1" />

    <text x="600" y="142" class="name" font-size="76" letter-spacing="-2" fill="#F2F3F7" text-anchor="middle">Priyanshu Mohan</text>

    <line x1="558" y1="160" x2="642" y2="160" stroke="#7AA2F7" stroke-width="3" stroke-linecap="round" />

    <text x="600" y="196" class="role" font-size="20" letter-spacing="5" fill="#7AA2F7" text-anchor="middle">FRONTEND ENGINEER</text>

    <text x="600" y="236" class="tagline" font-size="17" fill="#8B8FA3" text-anchor="middle">Building interactive digital experiences through motion, animation and clean engineering.</text>
  </g>
</svg>
