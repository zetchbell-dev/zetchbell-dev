name: profile

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Stats card: header, activity, repos, languages ---
      - name: Generate metrics card
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: zetchbell-dev
          template: classic

          base: header, activity, repositories

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_limit: 6
          plugin_languages_threshold: 2%
          plugin_languages_details: percentage

          # Off — calendar is handled separately below, and these throw
          # "Unexpected error" or render empty for a new account
          plugin_achievements: no
          plugin_habits: no
          plugin_calendar: no
          plugin_stars: no

          config_timezone: Asia/Kolkata
          config_display: large

      # --- 3D isometric contribution calendar ---
      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      # --- Commit both outputs together ---
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update profile metrics"
          git push
